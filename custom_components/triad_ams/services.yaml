turn_on_with_source:
  description: "Turn on the Triad AMS zone and set the input source to that of another media player entity."
  target:
    entity:
      domain: media_player
      integration: triad_ams
  fields:
    input_entity_id:
      required: true
      example: media_player.apple_tv
      selector:
        entity:
          domain: media_player
          filter:
            supported_features:
              - media_player.MediaPlayerEntityFeature.PLAY
              - media_player.MediaPlayerEntityFeature.PLAY_MEDIA
set_protocol_debug:
  description: "Enable or disable protocol-level logging for all Triad AMS entries."
  fields:
    enabled:
      required: true
      example: true
      selector:
        boolean:
set_route:
  name: "Set Route"
  description: "Route a physical Triad AMS input to a physical Triad AMS output by index. Use input 0 to disconnect the output."
  fields:
    output:
      required: true
      example: 3
      selector:
        number:
          min: 1
          max: 24
          step: 1
          mode: box
    input:
      required: true
      example: 5
      selector:
        number:
          min: 0
          max: 24
          step: 1
          mode: box
